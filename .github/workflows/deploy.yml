name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Render auto-deploys via GitHub integration — no action needed.
  # Vercel auto-deploys via GitHub integration — no action needed.
  # This job is a build gate before those auto-deploys land.

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  check-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: python -c "import main, scheduler, realtime_fetcher, tasks_engine, rating_engine, db"
