name: ETL — AmoCRM to Supabase

on:
  schedule:
    - cron: '0 2 * * *'  # Har kuni 07:00 Toshkent vaqti (UTC+5)
  workflow_dispatch:       # Qo'lda ham ishga tushirish mumkin

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv psycopg2-binary

      - name: Run ETL
        env:
          AMOCRM_DOMAIN: ${{ secrets.AMOCRM_DOMAIN }}
          AMOCRM_TOKEN:  ${{ secrets.AMOCRM_TOKEN }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: |
          python etl/etl.py
